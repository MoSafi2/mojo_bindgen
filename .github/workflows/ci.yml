name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install system libclang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check mojo_bindgen tests

      - name: Ruff (format check)
        run: ruff format --check mojo_bindgen tests

      - name: Pyright
        run: pyright mojo_bindgen

      - name: Pytest (excluding e2e)
        run: pytest -m "not e2e" -q
        env:
          # Help libclang find the system shared library on Ubuntu runners.
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu

      - name: Build sdist and wheel
        run: python -m build
