name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.8.14
        with:
          cache: true

      - name: Install system libclang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang1

      - name: Validate repository
        run: pixi run check-light
        env:
          # Help libclang find the system shared library on Ubuntu runners.
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
