# Builds sdist/wheel when a version tag is pushed. Upload to PyPI manually or add a
# publish job with trusted publishing / API tokens when ready.
name: Release build

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
