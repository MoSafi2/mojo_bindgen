# Build sdist/wheel on version tags and publish to PyPI. Uses PYPI_API_TOKEN repo secret.
#
# PyPI: create an API token at https://pypi.org/manage/account/token/ and add it as
# repository secret PYPI_API_TOKEN.
name: Release build

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ github.run_id }}
          path: dist/

  # Publish to PyPI on tag push (e.g. v0.2.0). Uses PYPI_API_TOKEN repo secret.
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-wheel
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wheel-*
          merge-multiple: true

      - name: Collect wheels into dist/
        run: mkdir -p python/dist && find artifacts -name "*.whl" -exec cp {} python/dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          packages-dir: python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
