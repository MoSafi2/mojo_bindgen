# Build sdist/wheel on version tags and publish to PyPI (trusted publishing / OIDC).
#
# One-time PyPI setup: https://docs.pypi.org/trusted-publishers/
# - Project → Settings → Publishing → add a trusted publisher for this repo,
#   workflow "release.yml", and (if used below) environment "pypi".
# - Create a GitHub Environment named "pypi" if you keep the environment block
#   (Protection rules are optional; empty is fine).
name: Release build

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mojo-bindgen/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
