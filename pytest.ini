[pytest]
testpaths = tests
pythonpath = .
markers =
    unit: fast unit-style tests under tests/unit
    surface: parser-to-emitter surface goldens under tests/surface
    corpus: parser and IR corpus cases under tests/corpus
    e2e: end-to-end runtime and toolchain tests under tests/e2e
    integration: multi-component tests that go beyond isolated unit behavior
    slow: tests that are slower than the default unit-test feedback loop
    expensive: tests that invoke heavy toolchains or runtime compilation
