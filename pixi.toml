[workspace]
authors = ["MoSafi2 <mohamed.mabrouk@rwth-aachen.de>"]
channels = ["https://conda.modular.com/max-nightly/", "conda-forge"]
name = "mojo_bindgen"
platforms = ["linux-64"]
preview = ["pixi-build"]

[package.build] 
backend = { name = "pixi-build-python", version = "0.*" }

[package.host-dependencies] 
hatchling = "==1.26.3"


# `default` includes the `dev` feature (full tooling). Use `-e install` for a smaller
# runtime-only environment (Mojo + mojo-bindgen, no notebooks or dev PyPI tools).
[environments]
default = { features = ["dev"], solve-group = "main" }
install = { features = [], solve-group = "main" }

[tasks]
example-zlib = "bash examples/zlib/generate.sh"
example-cairo = "bash examples/cairo/generate.sh"
example-libpng = "bash examples/libpng/generate.sh"
example-sqlite = "bash examples/sqlite/generate.sh"

[dependencies]
mojo = ">=1.0.0b1.dev2026042817,<2"
python = ">=3.14.4,<3.15"
pip = ">=26.0.1,<27"
rich = ">=15.0.0,<16"
typer = ">=0.25.0,<0.26"

[pypi-dependencies]
mojo-bindgen = { path = ".", editable = true }
build = ">=1.4.4, <2"

[feature.dev.dependencies]
ipykernel = ">=7.1.0,<8"
jupyter = ">=1.1.1,<2"
nodejs = ">=25.8.2,<25.9"

[feature.dev.pypi-dependencies]
pytest = ">=9.0.3, <10"
ruff = ">=0.15.12, <0.16"
pyright = ">=1.1.409, <2"

[feature.dev.tasks]
test = "pytest"
test-light = "pytest -m 'not expensive'"
lint = "ruff check mojo_bindgen tests"
format = "ruff format mojo_bindgen tests"
format-check = "ruff format --check mojo_bindgen tests"
typecheck = "pyright mojo_bindgen"
check-light = "bash scripts/check-light.sh"
precommit = "bash scripts/pre-commit.sh"
install-editable = "python -m pip install -e ."
build = "python -m build"
build-wheel = "python -m build --wheel"
build-sdist = "python -m build --sdist"
clean-dist = "python -c \"import shutil; from pathlib import Path; [shutil.rmtree(p, ignore_errors=True) for p in (Path('build'), Path('dist'))]; [shutil.rmtree(p, ignore_errors=True) if p.is_dir() else p.unlink(missing_ok=True) for p in Path('.').glob('*.egg-info')]\""
